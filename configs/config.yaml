data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

parser:
  encoding: utf-8
  fallback_encoding: latin-1

features:
  hcp_per_suit: true
  suit_lengths: true
  hand_pattern: true
  controls: true
  stoppers: true
  auction_features: true

models:
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_split: 5
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  lightgbm:
    n_estimators: 300
    max_depth: -1
    learning_rate: 0.05
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

evaluation:
  metrics:
    - accuracy
    - precision_macro
    - recall_macro
    - f1_macro
  top_k: [3, 5]
  confusion_matrix: true
  feature_importance: true
  shap: true

outputs:
  models_dir: outputs/models
  results_dir: outputs/results
